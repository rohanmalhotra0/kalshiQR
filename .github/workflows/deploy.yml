name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard
        run: |
          python generate_dashboard.py --paths 2000 --horizon 10 --salary 120000
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}

      - name: Generate live demo
        run: python generate_live_demo_static.py

      - name: Build Card Swap
        run: |
          cd card-swap && npm ci && npm run build

      - name: Prepare site
        run: |
          rm -rf site
          mkdir -p site
          cp pages/landing.html site/index.html
          cp pages/quiz.html site/quiz.html
          cp dashboard.html site/dashboard.html
          cp pages/paper.html site/paper.html
          cp pages/documentation.html site/documentation.html
          cp pages/about.html site/about.html
          cp live-demo.html site/live-demo.html
          cp static/live_demo_pipeline.js site/
          cp static/waves.js site/
          cp static/favicon.png site/
          cp static/apple-touch-icon.png site/
          cp "static/Group+74.webp" site/
          cp -r static/card-swap site/
          cp paper/currentModel.pdf site/
          touch site/.nojekyll
          grep -q "Get Started" site/index.html && echo "OK: index.html is the landing page"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
