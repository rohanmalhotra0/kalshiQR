services:
  - type: web
    name: modelkalshi
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: FRED_API_KEY
        sync: false
      - key: BLS_API_KEY
        sync: false
