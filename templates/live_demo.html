<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYU BnF x Kalshi — Live Demo</title>
  <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --surface2: #f1f5f9;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #00D26A;
      --accent2: #00D26A;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .navbar a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    .navbar a:hover { color: var(--accent); }
    .navbar .brand { font-weight: 600; color: var(--text); }
    .navbar-links { display: flex; gap: 1.5rem; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .step-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .step-card h2 { font-size: 1rem; color: var(--accent); margin-bottom: 0.75rem; }
    .step-card .formula {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow-x: auto;
    }
    .step-card .output {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--accent2);
    }
    .step-card .calc, .step-card .inputs { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .step-card .calc strong, .step-card .inputs strong { color: var(--text); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.35rem; text-transform: uppercase; }
    input, select { width: 100%; padding: 0.6rem 0.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; }
    button { padding: 0.75rem 1.5rem; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; font-family: inherit; }
    button:hover { filter: brightness(1.1); }
    .btn-dashboard {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-weight: 600;
      font-size: 0.9rem;
      text-align: center;
      text-decoration: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-dashboard:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(0, 210, 106, 0.2);
    }
    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">NYU BnF x Kalshi</a>
    <div class="navbar-links">
      <a href="/paper">Paper</a>
      <a href="/quiz">Quiz</a>
      <a href="/live-demo">Live Demo</a>
      <a href="/documentation">Documentation</a>
      <a href="/about">Team & Contact</a>
    </div>
  </nav>

  <div class="container">
    <h1>Live Demo</h1>
    <p class="subtitle">See how the model works, step by step. Change any input — results update instantly in your browser.</p>

    <form id="live-demo-form" class="form-grid" onsubmit="return false;">
      <div>
        <label>Industry</label>
        <select name="industry">{{ industry_options }}</select>
      </div>
      <div>
        <label>Company Size</label>
        <select name="company_size">{{ company_options }}</select>
      </div>
      <div>
        <label>Job Level</label>
        <select name="job_level">{{ job_options }}</select>
      </div>
      <div>
        <label>Salary ($)</label>
        <input type="number" name="salary" value="{{ salary }}" min="30000" max="1000000" step="5000">
      </div>
      <div>
        <label>Paths</label>
        <input type="number" name="n_paths" value="{{ n_paths }}" min="500" max="5000" step="500">
      </div>
      <div>
        <label>Horizon (years)</label>
        <input type="number" name="horizon_years" value="{{ horizon_years }}" min="1" max="30">
      </div>
      <div style="align-self:end; display:flex; flex-direction:column; gap:0.5rem;">
        <button type="button" id="run-btn">Run</button>
        <a href="dashboard.html" class="btn-dashboard">View Dashboard</a>
      </div>
    </form>

    <div id="steps-container">{{ steps_html }}</div>

    <script src="live_demo_pipeline.js"></script>
    <script>
      (function() {
        var form = document.getElementById('live-demo-form');
        var container = document.getElementById('steps-container');
        var runBtn = document.getElementById('run-btn');
        var debounceTimer;

        function getOpts() {
          var fd = new FormData(form);
          return {
            industry: fd.get('industry') || 'tech',
            company_size: fd.get('company_size') || 'startup',
            job_level: fd.get('job_level') || 'entry',
            salary: parseFloat(fd.get('salary')) || 120000,
            n_paths: parseInt(fd.get('n_paths'), 10) || 1500,
            horizon_years: parseInt(fd.get('horizon_years'), 10) || 10,
            seed: 42
          };
        }

        function run() {
          runBtn.disabled = true;
          runBtn.textContent = 'Running…';
          container.style.opacity = '0.6';
          setTimeout(function() {
            try {
              var opts = getOpts();
              var data = LiveDemoPipeline.runPipelineSteps(opts);
              container.innerHTML = LiveDemoPipeline.renderStepsHtml(data.steps) +
                (data.bottomLine ? LiveDemoPipeline.renderBottomLine(data.bottomLine) : '');
            } catch (e) {
              container.innerHTML = '<p style="color:#ef4444;">Error: ' + e.message + '</p>';
            }
            container.style.opacity = '1';
            runBtn.disabled = false;
            runBtn.textContent = 'Run';
          }, 0);
        }

        function debouncedRun() {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(run, 150);
        }

        form.addEventListener('change', debouncedRun);
        form.querySelectorAll('input').forEach(function(inp) {
          inp.addEventListener('input', debouncedRun);
        });
        runBtn.addEventListener('click', run);

        var params = new URLSearchParams(window.location.search);
        if (params.toString()) {
          ['industry', 'company_size', 'job_level', 'salary', 'n_paths', 'horizon_years'].forEach(function(name) {
            var v = params.get(name);
            if (v) {
              var el = form.elements[name];
              if (el) { el.value = v; if (el.tagName === 'SELECT') el.dispatchEvent(new Event('change')); }
            }
          });
          run();
        }
      })();
    </script>
  </div>
</body>
</html>
