<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYU BnF x Kalshi — Paper</title>
  <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #00D26A;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .navbar a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    .navbar a:hover { color: var(--accent); }
    .navbar .brand { font-weight: 600; color: var(--text); }
    .navbar-links { display: flex; gap: 1.5rem; }
    .pdf-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    .pdf-container object, .pdf-container iframe {
      width: 100%;
      height: 90vh;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .pdf-fallback { margin-top: 1rem; }
    .pdf-fallback a { color: var(--accent); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="./" class="brand">NYU BnF x Kalshi</a>
    <div class="navbar-links">
      <a href="paper.html">Paper</a>
      <a href="quiz.html">Quiz</a>
      <a href="live-demo.html">Live Demo</a>
      <a href="documentation.html">Documentation</a>
      <a href="about.html">About Us</a>
    </div>
  </nav>

  <div class="pdf-container">
    <object data="currentModel.pdf" type="application/pdf" width="100%" height="90vh">
      <p class="pdf-fallback">Your browser does not support PDF embedding. <a href="currentModel.pdf" download>Download the paper (PDF)</a></p>
    </object>
  </div>
</body>
</html>
