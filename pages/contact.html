<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — NYU BnF x Kalshi</title>
  <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --surface2: #f1f5f9;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #00a854;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .navbar a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    .navbar a:hover { color: var(--accent); }
    .navbar .brand { font-weight: 600; color: var(--text); }
    .navbar-links { display: flex; gap: 1.5rem; }
    .container { max-width: 480px; margin: 0 auto; padding: 3rem 2rem; text-align: center; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--text); }
    .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2.5rem; }

    .lanyard {
      display: inline-block;
      margin-bottom: 2rem;
      animation: lanyard-sway 4s ease-in-out infinite;
    }
    .lanyard-strap {
      width: 8px;
      height: 48px;
      margin: 0 auto 0;
      background: linear-gradient(180deg, var(--accent) 0%, #008f47 100%);
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,168,84,0.3);
    }
    .lanyard-clip {
      width: 24px;
      height: 12px;
      margin: -2px auto 0;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 0 0 12px 12px;
      border-top: none;
    }
    .lanyard-card {
      width: 280px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-top: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
    }
    .lanyard-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 12px;
      background: var(--bg);
      border-radius: 0 0 10px 10px;
      border: 2px solid var(--border);
      border-top: none;
    }
    .lanyard-card-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #0a0a0a;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .lanyard-card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .lanyard-card p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    @keyframes lanyard-sway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    .contact-info {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: left;
    }
    .contact-info a {
      color: var(--accent);
      text-decoration: none;
    }
    .contact-info a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="./" class="brand">NYU BnF x Kalshi</a>
    <div class="navbar-links">
      <a href="paper.html">Paper</a>
      <a href="quiz.html">Quiz</a>
      <a href="live-demo.html">Live Demo</a>
      <a href="documentation.html">Documentation</a>
      <a href="about.html">Our Team</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="container">
    <h1>Contact Us</h1>
    <p class="subtitle">Get in touch with the NYU BnF x Kalshi team</p>

    <div class="lanyard">
      <div class="lanyard-strap"></div>
      <div class="lanyard-clip"></div>
      <div class="lanyard-card">
        <img src="Group+74.webp" alt="NYU BnF x Kalshi" class="lanyard-card-image">
        <h2>NYU BnF x Kalshi</h2>
        <p>Hedge your income against job loss</p>
      </div>
    </div>

    <div class="contact-info">
      <p><strong>NYU Blockchain & Fintech</strong></p>
      <p><a href="https://www.nyubnf.com" target="_blank" rel="noopener">nyubnf.com</a></p>
      <p><a href="https://github.com/nyu-bnf/modelKalshi" target="_blank" rel="noopener">GitHub</a></p>
    </div>
  </div>
</body>
</html>
